name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release secrets
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_APP_OPEN_AD_UNIT_ID: ${{ secrets.ADMOB_APP_OPEN_AD_UNIT_ID }}
          ADMOB_BANNER_AD_UNIT_ID: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          missing=0
          for var in \
            ADMOB_APP_ID \
            ADMOB_APP_OPEN_AD_UNIT_ID \
            ADMOB_BANNER_AD_UNIT_ID \
            ANDROID_UPLOAD_KEYSTORE_BASE64 \
            ANDROID_UPLOAD_KEYSTORE_PASSWORD \
            ANDROID_UPLOAD_KEY_ALIAS \
            ANDROID_UPLOAD_KEY_PASSWORD
          do
            if [ -z "${!var}" ]; then
              echo "::error::$var is not set"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Create release signing keystore
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > keystore/release-upload.jks

      - name: Write local.properties for release
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_APP_OPEN_AD_UNIT_ID: ${{ secrets.ADMOB_APP_OPEN_AD_UNIT_ID }}
          ADMOB_BANNER_AD_UNIT_ID: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          cat > local.properties <<EOF
          tooltok.ads.enabled=true
          tooltok.ads.appId=$ADMOB_APP_ID
          tooltok.ads.appOpenAdUnitId=$ADMOB_APP_OPEN_AD_UNIT_ID
          tooltok.ads.bannerAdUnitId=$ADMOB_BANNER_AD_UNIT_ID
          tooltok.signing.storeFile=keystore/release-upload.jks
          tooltok.signing.storePassword=$ANDROID_UPLOAD_KEYSTORE_PASSWORD
          tooltok.signing.keyAlias=$ANDROID_UPLOAD_KEY_ALIAS
          tooltok.signing.keyPassword=$ANDROID_UPLOAD_KEY_PASSWORD
          EOF

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build release APK and bundle
        run: ./gradlew assembleRelease bundleRelease

      - name: Prepare release assets
        run: |
          cp app/build/outputs/apk/release/app-release.apk ToolTok-release.apk
          cp app/build/outputs/bundle/release/app-release.aab ToolTok-release.aab

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ToolTok-release.apk
            ToolTok-release.aab
          generate_release_notes: true
