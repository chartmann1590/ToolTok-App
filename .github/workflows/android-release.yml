name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release secrets
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_APP_OPEN_AD_UNIT_ID: ${{ secrets.ADMOB_APP_OPEN_AD_UNIT_ID }}
          ADMOB_BANNER_AD_UNIT_ID: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          missing=0
          for var in \
            ADMOB_APP_ID \
            ADMOB_APP_OPEN_AD_UNIT_ID \
            ADMOB_BANNER_AD_UNIT_ID \
            ANDROID_UPLOAD_KEYSTORE_BASE64 \
            ANDROID_UPLOAD_KEYSTORE_PASSWORD \
            ANDROID_UPLOAD_KEY_ALIAS \
            ANDROID_UPLOAD_KEY_PASSWORD
          do
            if [ -z "${!var}" ]; then
              echo "::error::$var is not set"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Generate monotonic Play Store versionCode
        id: version_code
        run: |
          version_code=$(date +%s)
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "TOOLTOK_CI_VERSION_CODE=$version_code" >> "$GITHUB_ENV"

      - name: Create release signing keystore
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > keystore/release-upload.jks

      - name: Write local.properties for release
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_APP_OPEN_AD_UNIT_ID: ${{ secrets.ADMOB_APP_OPEN_AD_UNIT_ID }}
          ADMOB_BANNER_AD_UNIT_ID: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          cat > local.properties <<EOF
          tooltok.ads.enabled=true
          tooltok.ads.appId=$ADMOB_APP_ID
          tooltok.ads.appOpenAdUnitId=$ADMOB_APP_OPEN_AD_UNIT_ID
          tooltok.ads.bannerAdUnitId=$ADMOB_BANNER_AD_UNIT_ID
          tooltok.signing.storeFile=keystore/release-upload.jks
          tooltok.signing.storePassword=$ANDROID_UPLOAD_KEYSTORE_PASSWORD
          tooltok.signing.keyAlias=$ANDROID_UPLOAD_KEY_ALIAS
          tooltok.signing.keyPassword=$ANDROID_UPLOAD_KEY_PASSWORD
          EOF

      - name: Validate release ads configuration
        run: |
          if ! grep -q '^tooltok.ads.enabled=true$' local.properties; then
            echo "::error::tooltok.ads.enabled must be true for release builds"
            exit 1
          fi

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build release APK and bundle
        run: ./gradlew assembleRelease bundleRelease -PtooltokCiVersionCode="${{ steps.version_code.outputs.version_code }}"

      - name: Verify release build has ads enabled
        run: |
          build_config="app/build/generated/source/buildConfig/release/com/tooltok/app/BuildConfig.java"
          if [ ! -f "$build_config" ]; then
            echo "::error::Release BuildConfig not found at $build_config"
            exit 1
          fi

          if ! grep -q 'public static final boolean ADS_ENABLED = true;' "$build_config"; then
            echo "::error::Release BuildConfig.ADS_ENABLED is not true"
            exit 1
          fi

      - name: Verify release bundle is signed
        run: jarsigner -verify -certs app/build/outputs/bundle/release/app-release.aab

      - name: Compute release metadata
        id: release_meta
        run: |
          version_name=$(sed -n 's/.*versionName = "\(.*\)"/\1/p' app/build.gradle.kts | head -n 1)
          version_code="${{ steps.version_code.outputs.version_code }}"

          if [ -z "$version_name" ] || [ -z "$version_code" ]; then
            echo "::error::Unable to parse versionName/versionCode from app/build.gradle.kts"
            exit 1
          fi

          tag="v${version_name}-build.${GITHUB_RUN_NUMBER}"
          title="ToolTok ${version_name} build ${GITHUB_RUN_NUMBER}"

          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        run: |
          cp app/build/outputs/apk/release/app-release.apk ToolTok-release.apk
          cp app/build/outputs/bundle/release/app-release.aab ToolTok-release.aab

      - name: Create GitHub release and tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release_meta.outputs.title }}
        run: |
          gh release create "$RELEASE_TAG" \
            ToolTok-release.apk \
            ToolTok-release.aab \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --generate-notes
